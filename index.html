<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Mobile App Feel -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0d0e15" />
    <title>VLive Web</title>
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <!-- App Container -->
    <div id="app">
      
      <!--===============================
           HOME FEED VIEW 
      ================================-->
      <main id="home-view" class="view active">
        <!-- Glassmorphic Header -->
        <header class="home-header glass">
          <h1 class="logo">V<span class="neon-text">Live</span></h1>
          <div class="header-icons">
             <div class="icon-circle">🔍</div>
             <div class="icon-circle">🔔</div>
          </div>
        </header>

        <!-- Horizontal Story Bubbles -->
        <section class="story-bubbles">
            <div class="bubble active"><div class="live-ring"></div><img src="./vtuber_1.png"><span class="badge">LIVE</span></div>
            <div class="bubble active"><div class="live-ring"></div><img src="./vtuber_2.png"><span class="badge">LIVE</span></div>
            <div class="bubble"><img src="./vtuber_1.png"></div>
            <div class="bubble"><img src="./vtuber_2.png"></div>
            <div class="bubble"><img src="./vtuber_1.png"></div>
        </section>

        <!-- Main Feed List -->
        <section class="feed-section">
          <h2 class="section-title">Trending Live</h2>
          <div id="feed-container" class="feed">
             <!-- Dynamically Populated by JS -->
          </div>
        </section>

        <!-- Bottom Navigation Tabs -->
        <nav class="bottom-nav glass">
           <div class="nav-item active">🏠<span class="nav-label">Home</span></div>
           <div class="nav-item">🧭<span class="nav-label">Discover</span></div>
           <div class="nav-item add-btn"><div class="add-circle">+</div></div>
           <div class="nav-item">💬<span class="nav-label">Inbox</span></div>
           <div class="nav-item">👤<span class="nav-label">Profile</span></div>
        </nav>
      </main>

      <!--===============================
           LIVE ROOM VIEW 
      ================================-->
      <main id="live-view" class="view">
        
        <!-- Live Avatar Background -->
        <div id="live-background" class="live-bg">
            <img id="live-avatar-img" src="" alt="Live Avatar" />
            <div class="bg-gradient-overlay"></div>
        </div>
        
        <!-- Top Controls -->
        <header class="live-header">
           <div class="host-info glass">
             <img id="live-host-avatar" src="" class="host-avatar">
             <div class="host-details">
                <h3 id="live-host-name">HostName</h3>
                <span id="live-viewers" class="viewer-count">👁 1.2k</span>
             </div>
             <button class="follow-btn">Follow</button>
           </div>
           <div class="close-btn glass" id="close-live">✕</div>
        </header>

        <!-- Dynamic Hearts Container -->
        <div id="hearts-container"></div>

        <!-- Chat & Interaction Overlay -->
        <div class="live-overlay">
           <div class="chat-container">
              <div id="chat-messages" class="chat-messages">
                 <!-- Populated by JS -->
                 <div class="chat-msg system">Welcome to the Live Room! Please be respectful to the VTuber.</div>
              </div>
           </div>
           
           <div class="live-controls">
              <div class="chat-input glass">
                 <input type="text" placeholder="Say something...">
                 <button class="send-btn">✈️</button>
              </div>
              <div class="side-actions">
                 <div class="action-btn glass">🎁</div>
                 <div class="action-btn glass" id="like-btn">❤️</div>
              </div>
           </div>
        </div>
      </main>

    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
